# Despliegue del Backend de Despachos
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despacho
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despacho
  template:
    metadata:
      labels:
        app: backend-despacho
    spec:
      containers:
        - name: backend-despacho
          image: backend-despachos:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/despachosdb?useSSL=false&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"
---
# Servicio del Backend de Despachos
apiVersion: v1
kind: Service
metadata:
  name: backend-despacho
spec:
  type: NodePort 
  selector:
    app: backend-despacho
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081