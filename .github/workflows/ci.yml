name: CI Pipeline - Full Stack

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]

jobs:
  # --- JOB PARA BACKEND (Maven) ---
  maven-checks:
    strategy:
      matrix:
        microservice: [ back-Despachos_SpringBoot, back-Ventas_SpringBoot ]
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🧪 Ejecutar tests y Build
        run: |
          # Navegación dinámica según el microservicio
          cd backend/${{ matrix.microservice }}
          
          if [ "${{ matrix.microservice }}" == "back-Despachos_SpringBoot" ]; then
            cd Springboot-API-REST-DESPACHO
          else
            cd Springboot-API-REST
          fi
          
          chmod +x mvnw
          ./mvnw clean package -DskipTests

  # --- JOB PARA FRONTEND (Node) ---
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_despacho
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front_despacho/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🧪 Ejecutar tests
        run: npm test -- --watchAll=false

      - name: 🏗️ Construir aplicación
        run: npm run build