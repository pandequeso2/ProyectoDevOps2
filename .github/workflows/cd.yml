name: Despliegue en AWS con EKS (Elastic Kubernetes Service) - Experiencia 3

on:
  pull_request:
    branches: [ develop ]
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: devops-proyect-cluster 
    steps:
      - name: Checkout (git clone...)
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Loguear con ECR (Elastic Container Registry)
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Rescatar el AWS Account ID
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Definir las URL de los ECR
        run: |
          echo "BACKEND_DESPACHOS_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-back-despachos" >> $GITHUB_ENV
          echo "BACKEND_VENTAS_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-back-ventas" >> $GITHUB_ENV
          echo "FRONTEND_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-frontend" >> $GITHUB_ENV
      
      # --- 1. backend-despachos ---
      - name: Build backend-despachos
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $BACKEND_DESPACHOS_ECR:${GITHUB_SHA} \
            ./backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO \
            --load
      - name: Push backend-despachos
        run: |
          docker push $BACKEND_DESPACHOS_ECR:${GITHUB_SHA}

      # --- 2. backend-ventas ---
      - name: Build backend-ventas
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $BACKEND_VENTAS_ECR:${GITHUB_SHA} \
            ./backend/back-Ventas_SpringBoot/Springboot-API-REST \
            --load
      - name: Push backend-ventas
        run: |
          docker push $BACKEND_VENTAS_ECR:${GITHUB_SHA}

      # --- 3. frontend ---
      - name: Build frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $FRONTEND_ECR:${GITHUB_SHA} \
            ./front_despacho \
            --load
      - name: Push frontend
        run: |
          docker push $FRONTEND_ECR:${GITHUB_SHA}
      
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        
      - name: Configurar EKS a través de GitHub Actions
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME
            
      - name: Crear o actualizar ConfigMap de inicialización MySQL
        run: |
          kubectl create configmap mysql-init-config --from-file=./mysql-init/init.sql -o yaml --dry-run=client | kubectl apply -f -

      - name: Aplicar los manifiestos de Kubernetes
        run: |
          kubectl apply -f infra/k8s/
          
      - name: Aplicar HPA (Horizontal Pod Autoscaler)
        run: |
          # Crear HPA si el archivo existe
          if [ -f "infra/k8s/hpa.yaml" ]; then
            kubectl apply -f infra/k8s/hpa.yaml
            echo "HPA aplicado correctamente"
          else
            echo "⚠️ Archivo hpa.yaml no encontrado. El autoscaling no estará disponible."
          fi
          
      - name: Verificar HPA
        run: |
          echo "=== HPA Status ==="
          kubectl get hpa || echo "No HPA found"
          
      - name: Actualizar nombre de la imagen de backend-despachos en Kubernetes
        run: |
          kubectl set image deployment/backend-despacho \
            backend-despacho=$BACKEND_DESPACHOS_ECR:${GITHUB_SHA}
            
      - name: Actualizar nombre de la imagen de backend-ventas en Kubernetes
        run: |
          kubectl set image deployment/backend-ventas \
            backend-ventas=$BACKEND_VENTAS_ECR:${GITHUB_SHA}
            
      - name: Actualizar nombre de la imagen de frontend-despacho en Kubernetes
        run: |
          kubectl set image deployment/frontend-despacho \
            frontend-despacho=$FRONTEND_ECR:${GITHUB_SHA}
      
      - name: Esperar despliegue de backend-despacho
        run: |
          kubectl rollout status deployment/backend-despacho --timeout=5m
          
      - name: Esperar despliegue de backend-ventas
        run: |
          kubectl rollout status deployment/backend-ventas --timeout=5m
          
      - name: Esperar despliegue de frontend-despacho
        run: |
          kubectl rollout status deployment/frontend-despacho --timeout=5m

      - name: Esperar que HPA esté activo
        run: |
          echo "Esperando que HPA se active..."
          sleep 10
          kubectl get hpa

      - name: Obtener URL del Frontend (LoadBalancer)
        run: |
          echo "=== Servicios desplegados ==="
          kubectl get svc
          echo ""
          echo "=== URL del Frontend ==="
          kubectl get service frontend-despacho -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "Esperando asignación de LoadBalancer..."
          echo ""

      - name: Mostrar resumen del despliegue
        run: |
          echo "=========================================="
          echo "✅ DESPLIEGUE COMPLETADO EXITOSAMENTE"
          echo "=========================================="
          echo ""
          echo "📊 Estado de los Pods:"
          kubectl get pods
          echo ""
          echo "📊 Estado de los Servicios:"
          kubectl get svc
          echo ""
          echo "📊 Autoscaling (HPA):"
          kubectl get hpa